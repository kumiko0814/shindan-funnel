<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>診断モック プレビュー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans JP",sans-serif;background:linear-gradient(170deg,#F4F8FC,#F6F1F4);color:#3C4353;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.8;}
.card{max-width:420px;width:100%;background:#fff;border-radius:24px;box-shadow:0 14px 40px rgba(42,63,99,.14);padding:30px 24px;text-align:center;}
.eye{font-size:11px;letter-spacing:.18em;color:#C56E8A;font-weight:900;}
h1{font-size:21px;color:#2A3F63;margin:8px 0 4px;}
.lead{font-size:13px;color:#8C93A3;margin-bottom:22px;}
a.demo{display:block;text-decoration:none;color:#fff;border-radius:18px;padding:18px;margin-bottom:14px;text-align:left;position:relative;box-shadow:0 8px 22px rgba(0,0,0,.10);}
a.demo:active{transform:translateY(2px);}
.famm{background:linear-gradient(140deg,#D98BA3,#C56E8A);}
.abcash{background:linear-gradient(140deg,#54709B,#2A3F63);}
.k{font-size:11px;opacity:.9;font-weight:700;letter-spacing:.06em;}
.t{font-size:17px;font-weight:900;margin:3px 0 1px;}
.d{font-size:12px;opacity:.94;}
.arr{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:22px;font-weight:900;}
.note{font-size:11px;color:#A7AEBC;margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <div class="eye">MERONE ／ 診断モック プレビュー</div>
  <h1>触れる診断ツール（試作）</h1>
  <p class="lead">スマホで、最後まで触ってみてください☺️</p>
  <a class="demo famm" href="famm.html">
    <div class="k">FAMM ／ ママ向け</div>
    <div class="t">おうち時間 収益化タイプ診断</div>
    <div class="d">6問 → タイプ → 家の物の値付け体験</div>
    <div class="arr">→</div>
  </a>
  <a class="demo abcash" href="abcash.html">
    <div class="k">ABCASH ／ 卒業生向け</div>
    <div class="t">お金の"次のステージ"診断</div>
    <div class="d">6問 → フェーズ → 眠れる余力の見える化</div>
    <div class="arr">→</div>
  </a>
  <p class="note">※ 試作モックです。予約導線・数値は本番接続で差し込みます。</p>
</div>
</body>
</html>
